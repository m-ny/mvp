<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Log Viewer — Outreach Angle Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    line-height: 1.6;
  }

  header {
    text-align: center;
    padding: 50px 40px 30px;
    background: linear-gradient(180deg, #141420 0%, #0a0a0f 100%);
  }
  header h1 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
  }
  header h1 span { color: #c9a96e; }
  header .meta {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    letter-spacing: 1px;
  }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #5a9e6f;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .translate-btn {
    position: fixed; top: 20px; right: 20px;
    background: #c9a96e; color: #0a0a0f; border: none;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    z-index: 100; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .translate-btn:hover { background: #d4b87a; transform: scale(1.05); }
  .translate-btn .flag { margin-right: 6px; }

  .summary-bar {
    display: flex; justify-content: center; gap: 40px;
    padding: 20px 40px; max-width: 900px; margin: 0 auto;
  }
  .summary-stat { text-align: center; }
  .summary-stat .num { font-size: 28px; font-weight: 300; color: #c9a96e; }
  .summary-stat .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

  .controls {
    display: flex; justify-content: center; gap: 12px;
    padding: 20px 40px; flex-wrap: wrap;
  }
  .controls button {
    background: #1e1e2a; border: 1px solid #2a2a3a; color: #ccc;
    padding: 8px 20px; border-radius: 8px; font-size: 13px;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .controls button:hover { border-color: #c9a96e; color: #fff; }
  .controls button.active { background: #c9a96e; color: #0a0a0f; border-color: #c9a96e; font-weight: 600; }

  .cards {
    max-width: 1000px; margin: 0 auto;
    padding: 20px 40px 60px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .run-card {
    background: #16161f; border: 1px solid #2a2a3a;
    border-radius: 14px; overflow: hidden; transition: all 0.3s;
  }
  .run-card:hover { border-color: #3a3a4a; }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px; border-bottom: 1px solid #1e1e2a; cursor: pointer;
  }
  .card-header:hover { background: #1a1a25; }
  .client-info { display: flex; align-items: center; gap: 16px; }
  .client-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: #c9a96e; display: flex; align-items: center;
    justify-content: center; font-size: 18px; color: #0a0a0f;
    font-weight: 600; flex-shrink: 0;
  }
  .client-name { font-size: 17px; font-weight: 600; color: #fff; }
  .client-tag { font-size: 12px; color: #888; }
  .card-badges { display: flex; gap: 10px; align-items: center; }
  .badge {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-type { background: rgba(201,169,110,0.15); color: #c9a96e; }
  .badge-conf-high { background: rgba(90,158,111,0.15); color: #5a9e6f; }
  .badge-conf-medium { background: rgba(201,169,110,0.15); color: #c9a96e; }
  .badge-conf-low { background: rgba(201,85,90,0.15); color: #c9555a; }
  .expand-icon { color: #555; font-size: 18px; transition: transform 0.3s; }
  .run-card.expanded .expand-icon { transform: rotate(180deg); }

  .card-body { display: none; padding: 0 28px 24px; }
  .run-card.expanded .card-body { display: block; }

  .section-title {
    font-size: 11px; font-weight: 700; color: #c9a96e;
    text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px;
  }

  .angle-block {
    background: #1a1a25; border-radius: 10px; padding: 18px 20px; margin-bottom: 4px;
  }
  .angle-label { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .angle-summary { font-size: 14px; color: #aaa; line-height: 1.6; }

  .evidence-list { list-style: none; padding: 0; }
  .evidence-list li {
    font-size: 13px; color: #999; padding: 5px 0 5px 20px;
    position: relative; border-bottom: 1px solid #1a1a25;
  }
  .evidence-list li:last-child { border-bottom: none; }
  .evidence-list li::before { content: '→'; position: absolute; left: 0; color: #c9a96e; }

  .product-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .product-chip {
    background: #1a1a25; border: 1px solid #2a2a3a;
    border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 200px;
  }
  .product-chip .prod-name { font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 4px; }
  .product-chip .prod-reason { font-size: 12px; color: #888; }

  .draft-card {
    background: #1a1a25; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 10px;
  }
  .draft-tone {
    font-size: 11px; color: #c9a96e; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }
  .draft-msg {
    font-size: 15px; color: #ddd; line-height: 1.7;
    padding: 12px 16px; background: #20202a;
    border-radius: 8px; border-left: 3px solid #c9a96e;
  }

  .risk-list li, .dontlist li {
    font-size: 13px; padding: 4px 0 4px 20px; position: relative;
  }
  .risk-list { list-style: none; padding: 0; }
  .risk-list li { color: #c9a96e; }
  .risk-list li::before { content: '⚠'; position: absolute; left: 0; }
  .dontlist { list-style: none; padding: 0; }
  .dontlist li { color: #999; }
  .dontlist li::before { content: '✗'; position: absolute; left: 0; color: #c9555a; }

  .next-step-block {
    background: #1a1a25; border-radius: 10px; padding: 14px 20px;
    font-size: 14px; color: #aaa; border-left: 3px solid #5a9e6f;
  }

  .trace-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
  }
  .trace-item { background: #1a1a25; border-radius: 8px; padding: 12px 16px; }
  .trace-item .tk { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .trace-item .tv { font-size: 14px; color: #ccc; font-weight: 600; margin-top: 4px; }

  .empty-state { text-align: center; padding: 80px 40px; color: #555; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  footer {
    text-align: center; padding: 30px; color: #444;
    font-size: 11px; letter-spacing: 1px; border-top: 1px solid #1a1a2a;
  }

  @media (max-width: 768px) {
    .card-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .summary-bar { gap: 20px; }
    .cards { padding: 20px 16px 60px; }
    .translate-btn { top: auto; bottom: 20px; right: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>Run Log <span>Viewer</span></h1>
  <div class="meta">
    <span class="live-dot"></span>
    Auto-refreshes every 5s · <span id="lastUpdate"></span>
  </div>
</header>

<button class="translate-btn" onclick="toggleLang()">
  <span class="flag" id="flagIcon">🇬🇧</span>
  <span id="langLabel">English</span>
</button>

<div class="summary-bar" id="summaryBar"></div>
<div class="controls" id="filterBar"></div>
<div class="cards" id="cardsContainer">
  <div class="empty-state"><div class="icon">📂</div><p>Loading run_log.json...</p></div>
</div>

<footer>MODULE 5 — OUTREACH ANGLE AGENT · RUN LOG VIEWER</footer>

<script>
let lang = 'zh';
let allRuns = [];
let filter = 'all';

const personaMap = {
  '陈雅琳': { en: 'Chen Yalin', tagZh: '艺术圈女藏家', tagEn: 'Art World Collector' },
  '周晓彤': { en: 'Zhou Xiaotong', tagZh: '社交媒体新世代', tagEn: 'Social Media Native' },
  '林世恒': { en: 'Lin Shiheng', tagZh: '传统品味收藏家', tagEn: 'Heritage Connoisseur' },
  '赵思琳': { en: 'Zhao Silin', tagZh: '社交场红毯常客', tagEn: 'Red Carpet Socialite' },
  '刘凯文': { en: 'Liu Kaiwen', tagZh: '效率至上科技高管', tagEn: 'Efficiency-First Tech Exec' },
};

function getParsed(run) {
  const out = run.output || {};
  if (lang === 'en' && out.parsed_en) return out.parsed_en;
  if (lang === 'zh' && out.parsed_zh) return out.parsed_zh;
  return out.parsed || {};
}

function getClientDisplay(run) {
  const name = run.input?.client_name || '';
  const info = personaMap[name] || {};
  return {
    name: lang === 'en' ? (info.en || name) : name,
    tag: lang === 'en' ? (info.tagEn || '') : (info.tagZh || ''),
  };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
}

function confBadge(c) {
  const cl = c === 'high' ? 'badge-conf-high' : c === 'medium' ? 'badge-conf-medium' : 'badge-conf-low';
  return `<span class="badge ${cl}">${c}</span>`;
}

function renderCard(run, idx) {
  const p = getParsed(run);
  if (!p || !p.best_angle) return '';

  const cl = getClientDisplay(run);
  const id = run.run_id || idx;
  const type = p.outreach_type || '';

  const evidence = (p.evidence_used || []).map(e => `<li>${esc(e)}</li>`).join('');

  const products = (p.recommended_products || []).length > 0
    ? (p.recommended_products || []).map(pr => `
        <div class="product-chip">
          <div class="prod-name">${esc(pr.item)}</div>
          <div class="prod-reason">${esc(pr.reason)}</div>
        </div>`).join('')
    : `<span style="color:#888;font-size:13px;">—</span>`;

  const drafts = (p.wechat_drafts || []).map((d, i) => `
    <div class="draft-card">
      <div class="draft-tone">${esc(d.tone)}</div>
      <div class="draft-msg">${esc(d.message)}</div>
    </div>`).join('');

  const risks = (p.risk_flags || []).length > 0
    ? `<ul class="risk-list">${p.risk_flags.map(r => `<li>${esc(r)}</li>`).join('')}</ul>`
    : `<span style="color:#5a9e6f;font-size:13px;">None</span>`;

  const donts = (p.do_not_say || []).length > 0
    ? `<ul class="dontlist">${p.do_not_say.map(d => `<li>${esc(d)}</li>`).join('')}</ul>` : '';

  return `
    <div class="run-card" id="card-${id}">
      <div class="card-header" onclick="toggle('${id}')">
        <div class="client-info">
          <div class="client-avatar">${(cl.name||'?')[0]}</div>
          <div>
            <div class="client-name">${esc(cl.name)} · ${run.input?.client_id||''}</div>
            <div class="client-tag">${esc(cl.tag)} · ${fmtTime(run.timestamp)}</div>
          </div>
        </div>
        <div class="card-badges">
          <span class="badge badge-type">${type.replace(/_/g,' ')}</span>
          ${confBadge(p.confidence||'low')}
          <span class="expand-icon">▼</span>
        </div>
      </div>
      <div class="card-body">
        <div class="section-title">Recommended Angle</div>
        <div class="angle-block">
          <div class="angle-label">${esc(p.best_angle)}</div>
          <div class="angle-summary">${esc(p.angle_summary)}</div>
        </div>

        <div class="section-title">Evidence Used (${(p.evidence_used||[]).length})</div>
        <ul class="evidence-list">${evidence}</ul>

        <div class="section-title">Recommended Products</div>
        <div class="product-grid">${products}</div>

        <div class="section-title">WeChat Message Drafts</div>
        ${drafts}

        <div class="section-title">Risk Flags</div>
        ${risks}

        ${donts ? `<div class="section-title">Do Not Say</div>${donts}` : ''}

        <div class="section-title">Next Step</div>
        <div class="next-step-block">${esc(p.next_step||'—')}</div>

        <div class="section-title">Trace</div>
        <div class="trace-grid">
          <div class="trace-item"><div class="tk">Model</div><div class="tv">${run.model||''}</div></div>
          <div class="trace-item"><div class="tk">Input Tokens</div><div class="tv">${(run.token_usage?.input_tokens||0).toLocaleString()}</div></div>
          <div class="trace-item"><div class="tk">Output Tokens</div><div class="tv">${(run.token_usage?.output_tokens||0).toLocaleString()}</div></div>
          <div class="trace-item"><div class="tk">Sources</div><div class="tv">${(run.trace?.retrieved_sources||[]).join(', ')}</div></div>
        </div>
      </div>
    </div>`;
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggle(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('expanded');
}

function buildSummary() {
  const total = allRuns.length;
  const hi = allRuns.filter(r => getParsed(r).confidence === 'high').length;
  const types = [...new Set(allRuns.map(r => getParsed(r).outreach_type).filter(Boolean))];
  const tok = allRuns.reduce((s,r) => s + (r.token_usage?.total_tokens||0), 0);
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><div class="num">${total}</div><div class="label">Total Runs</div></div>
    <div class="summary-stat"><div class="num">${hi}</div><div class="label">High Confidence</div></div>
    <div class="summary-stat"><div class="num">${types.length}</div><div class="label">Outreach Types</div></div>
    <div class="summary-stat"><div class="num">${(tok/1000).toFixed(1)}k</div><div class="label">Tokens Used</div></div>`;
}

function buildFilters() {
  const types = ['all', ...new Set(allRuns.map(r => getParsed(r).outreach_type).filter(Boolean))];
  document.getElementById('filterBar').innerHTML = types.map(t => `
    <button class="${t===filter?'active':''}" onclick="setFilter('${t}')">${t==='all'?'All':t.replace(/_/g,' ')}</button>
  `).join('');
}

function setFilter(f) { filter = f; render(); }

function render() {
  buildSummary();
  buildFilters();
  let runs = filter === 'all' ? allRuns : allRuns.filter(r => getParsed(r).outreach_type === filter);
  const c = document.getElementById('cardsContainer');
  if (!runs.length) { c.innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>No runs found.</p></div>`; return; }
  c.innerHTML = runs.map((r,i) => renderCard(r,i)).join('');
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('langLabel').textContent = lang === 'zh' ? 'English' : '中文';
  document.getElementById('flagIcon').textContent = lang === 'zh' ? '🇬🇧' : '🇨🇳';
  render();
}

async function loadData() {
  try {
    const res = await fetch('run_log.json?t=' + Date.now());
    const data = await res.json();
    const runs = Array.isArray(data) ? data : [data];
    if (JSON.stringify(runs) !== JSON.stringify(allRuns)) {
      allRuns = runs;
      render();
    }
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
  } catch(e) { console.log('Loading...', e); }
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
